<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACFL EMI Calculator</title>

<style>

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #e85222;
}

.app-wrapper {
  max-width: 420px;
  margin: auto;
  background: #fff7f2;
  min-height: 100vh;
  padding: 15px;
  box-sizing: border-box;
}

.logo {
  display: block;
  margin: 10px auto;
  width: 130px;
}

h1 {
  text-align: center;
  color: #e85222;
  margin-bottom: 15px;
  font-size: 20px;
}

.card {
  background: #ffffff;
  padding: 14px;
  border-radius: 12px;
  box-shadow: 0px 3px 10px rgba(0,0,0,0.08);
  margin-bottom: 12px;
}

label {
  font-size: 12px;
  font-weight: 600;
  color: #555;
}
* {
  box-sizing: border-box;
}
input, select {
  width: 100%;
  padding: 9px;
  margin-top: 4px;
  margin-bottom: 9px;
  border-radius: 6px;
  border: 1px solid #ddd;
  font-size: 14px;
  height: 34px;
}

.compact {
  height: 28px;
  padding: 4px 6px;
  font-size: 12px;
}

input:focus, select:focus {
  border-color: #e85222;
  box-shadow: 0 0 5px rgba(232,82,34,0.3);
  outline: none;
}

button {
  width: 100%;
  padding: 12px;
  background: #e85222;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #cf461c;
}

.result {
  background: #fff1ea;
  border-left: 4px solid #e85222;
  padding: 12px;
  border-radius: 8px;
  font-size: 14px;
  display: none;
}

.result div {
  margin: 6px 0;
}

.highlight {
  font-size: 17px;
  font-weight: bold;
  color: #e85222;
}

</style>
</head>

<body>

<div class="app-wrapper">

<img src="ACFL Logo PNG WhiteBG.png" class="logo">

<h1>EMI Calculator</h1>

<div class="card">

<label>Loan Amount (₹)</label>
<input type="number" id="loan" class="compact">

<label>Tenure</label>
<select id="tenure">
  <option value="12">12 Months</option>
  <option value="18">18 Months</option>
  <option value="24">24 Months</option>
  <option value="30">30 Months</option>
  <option value="36" selected>36 Months</option>
</select>

<label>Interest Rate</label>
<select id="rate">
  <option value="27">27%</option>
  <option value="27.5">27.5%</option>
  <option value="28.5">28.5%</option>
</select>

<label>Borrower Age</label>
<input type="number" id="age" class="compact">

<button onclick="calculate()">Calculate EMI</button>

</div>

<div class="result" id="output"></div>

</div>

<script>

60:{12:2105.44,18:3187.68,24:4236.04,30:5357.48,36:6442.74}
};

function calculate(){

let P = parseFloat(document.getElementById("loan").value);
let n = parseInt(document.getElementById("tenure").value);
let r = parseFloat(document.getElementById("rate").value)/12/100;
let age = parseInt(document.getElementById("age").value);

if (!P || P<=0){ alert("Enter valid loan amount"); return; }
if (!insuranceRates[age]){ alert("Age must be 18–60"); return; }

let emi = (P*r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
emi = Math.ceil(emi/10)*10;

let pf = P*0.03;
let total_pf = pf + (pf*0.18);

let ratePerLakh = insuranceRates[age][n];
let insurance = (P/100000)*ratePerLakh;
let total_insurance = insurance + (insurance*0.18);

document.getElementById("output").style.display = "block";
document.getElementById("output").innerHTML = `
<div>EMI: <span class="highlight">₹${emi}</span></div>
<div>Processing Fee: ₹${total_pf.toFixed(0)}</div>
<div>Insurance: ₹${total_insurance.toFixed(0)}</div>
`;

}

</script>

</body>
</html>
